name: todo_app
description: A personal productivity To-Do app with Google Sign-In, task management, and Pomodoro focus mode.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Auth
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Networking
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.3.1

  # UI & Charts
  fl_chart: ^0.68.0
  table_calendar: ^3.1.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
